<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lead Form</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <div class="card shadow p-4">
    <h2 class="mb-4">Lead Tracker</h2>

    <form id="leadForm">
      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>

      <!-- Mobile -->
      <div class="mb-3">
        <label class="form-label">Mobile</label>
        <input type="text" id="mobile" class="form-control" required>
      </div>

      <!-- Address -->
      <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea id="address" class="form-control" rows="3" required></textarea>
      </div>

      <!-- Date -->
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" id="date" class="form-control" required>
      </div>

      <!-- Notes -->
      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea id="notes" class="form-control" rows="3"></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary">Save Lead</button>
    </form>
  </div>

  <script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD1k3vMvPt3Rqi8JgAl56DrO82vXn3WbAo",
      authDomain: "nicrm-1afa3.firebaseapp.com",
      projectId: "nicrm-1afa3",
      storageBucket: "nicrm-1afa3.firebasestorage.app",
      messagingSenderId: "1087524542055",
      appId: "1:1087524542055:web:c46c43ba9849e3552566c2"
    };

    // Initialize Firebase + Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Form submit handler
    document.getElementById("leadForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const docRef = await addDoc(collection(db, "Leads"), {
          name: document.getElementById("name").value,
          mobile: document.getElementById("mobile").value,
          address: document.getElementById("address").value,
          date: document.getElementById("date").value,
          notes: document.getElementById("notes").value,
          createdAt: new Date()
        });
        alert("✅ Lead Saved Successfully! ID: " + docRef.id);
        document.getElementById("leadForm").reset();
      } catch (error) {
        alert("❌ Error: " + error);
      }
    });
  </script>
  
</body>
</html>
